<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabañas Gil | Mazamitla, Jalisco</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
--primary: #5d4037;
--accent: #8d6e63;
--light: #f5f5f7;
--dark: #2c1d1a;
}

body {
font-family: 'Raleway', sans-serif;
margin: 0;
background-color: var(--light);
color: var(--dark);
}

header {
background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('20260114_152337.jpg');
background-size: cover;
background-position: center;
height: 60vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
color: white;
text-align: center;
}

h1 {
font-family: 'Playfair Display', serif;
font-size: 4rem;
margin-bottom: 10px;
}

.container {
max-width: 1100px;
margin: auto;
padding: 40px 20px;
}

.intro {
text-align: center;
margin-bottom: 60px;
}

/* Galería Estilo Grid */
.gallery {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
gap: 20px;
}

.gallery-item {
overflow: hidden;
border-radius: 8px;
box-shadow: 0 4px 15px rgba(0,0,0,0.1);
height: 250px;
}

.gallery-item img {
width: 100%;
height: 100%;
object-fit: cover;
transition: transform 0.5s;
}

.gallery-item img:hover {
transform: scale(1.1);
}

/* Sección Mapa */
.map-section {
margin-top: 60px;
text-align: center;
}

iframe {
width: 100%;
height: 450px;
border: 0;
border-radius: 12px;
box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

footer {
background-color: var(--primary);
color: white;
text-align: center;
padding: 40px 20px;
margin-top: 60px;
}

.btn-contact {
background-color: var(--accent);
color: white;
padding: 15px 30px;
text-decoration: none;
border-radius: 30px;
font-weight: bold;
display: inline-block;
margin-top: 20px;
}
</style>
</head>
<body>

<header>
<h1>Cabañas Gil</h1>
<p>Tu refugio perfecto en el corazón del bosque de Mazamitla</p>
</header>

<div class="container">
<section class="intro">
<h2>Nuestra Estancia</h2>
<p>Disfruta de la tranquilidad, el aire puro y la comodidad de nuestras cabañas totalmente equipadas.</p>
</section>

<div class="gallery">
<div class="gallery-item"><img src="20260114_152416.jpg" alt="Fachada Cabaña"></div>
<div class="gallery-item"><img src="20260114_152419.jpg" alt="Exterior"></div>
<div class="gallery-item"><img src="20260114_152440.jpg" alt="Vista Nocturna"></div>
<div class="gallery-item"><img src="IMG-20250624-WA0030.jpg" alt="Habitación Literas"></div>
<div class="gallery-item"><img src="IMG-20250624-WA0028.jpg" alt="Interior"></div>
<div class="gallery-item"><img src="IMG-20250624-WA0031.jpg" alt="Baño"></div>
</div>

<section class="map-section">
<h2>Ubicación</h2>
<p>Encuéntranos fácilmente en Mazamitla, Jalisco.</p>
<iframe src="https://maps.app.goo.gl/Z9jMqxnLiBgDoTPy7">
</section>
</div>

<footer>
<h3>¿Listo para tu escapada?</h3>
<p>Contáctanos para disponibilidad y precios.</p>
<a href="https://wa.me/TU_NUMERO_AQUI" class="btn-contact">Reservar por WhatsApp</a>
<p style="margin-top: 20px; font-size: 0.8rem;">&copy; 2026 Cabañas Gil - Mazamitla, Jalisco.</p>
</footer>

</body>
</html>
